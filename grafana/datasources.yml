apiVersion: 1

datasources:
  - name: WeaverPostgres
    type: postgres
    url: postgres:5432
    database: weaver_db
    user: weaver_user
    secureJsonData:
      password: weaver_password
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: false
    isDefault: true
