version: '3.9'

x-django-env: &django-env
  env_file: [./backend/.env]
  environment:
    - DJANGO_SETTINGS_MODULE=config.settings

services:
  postgres:
    image: postgres:15-alpine
    container_name: weaver-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-weaver_db}
      POSTGRES_USER: ${DB_USER:-weaver_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-weaver_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-weaver_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: weaver-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: weaver-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: weaver-kafka
    restart: unless-stopped
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build: ./backend
    container_name: weaver-backend
    restart: unless-stopped
    <<: *django-env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./backend:/app
      - media_files:/app/media
    command: >
      sh -c "python manage.py migrate &&
             python scripts/init_db.py &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/auth/login/"]
      interval: 30s
      timeout: 10s
      retries: 5

  celery_worker:
    build: ./backend
    container_name: weaver-celery-worker
    restart: unless-stopped
    <<: *django-env
    depends_on: [backend, redis]
    command: celery -A config worker --loglevel=info --concurrency=2

  celery_beat:
    build: ./backend
    container_name: weaver-celery-beat
    restart: unless-stopped
    <<: *django-env
    depends_on: [backend, redis, postgres]
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  kafka_consumer:
    build: ./backend
    container_name: weaver-kafka-consumer
    restart: unless-stopped
    <<: *django-env
    depends_on: [backend, kafka]
    command: python kafka_consumer/consumer.py

  frontend:
    build: ./frontend
    container_name: weaver-frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: weaver-nginx
    restart: unless-stopped
    depends_on: [backend, frontend]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - media_files:/media

  grafana:
    image: grafana/grafana:latest
    container_name: weaver-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=grafana123
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  media_files:
  grafana_data:
